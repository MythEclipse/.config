general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = ~/.config/hypr/wallpapers/hoyoverse.jpg
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(203, 166, 247, 0.6)
    inner_color = rgba(30, 30, 46, 0.6)
    font_color = rgb(205, 214, 244)
    fade_on_empty = true
    placeholder_text = <span foreground="##cdd6f4">Password...</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = Hello, $USER
    color = rgba(203, 166, 247, 1.0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 10
    halign = center
    valign = center
}
